<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manga Library</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
    }

    header {
      padding: 16px;
      font-size: 20px;
      background: #1c1c1c;
    }

    .container {
      padding: 16px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border: none;
      border-radius: 6px;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: #4caf50;
      color: white;
      cursor: pointer;
    }

    .list {
      margin-top: 20px;
    }

    .item {
      background: #222;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .item img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .delete {
      background: #e74c3c;
      margin-top: 8px;
    }

    .search {
      margin-bottom: 10px;
      background: #333;
    }
  </style>
</head>

<body>

<header>📚 Manga Library</header>

<div class="container">

  <input id="search" class="search" placeholder="🔍 検索（タイトル）" oninput="render()" />

  <input id="title" placeholder="タイトル" />
  <input id="note" placeholder="メモ" />
  <input id="image" placeholder="画像URL（任意）" />

  <button onclick="addManga()">追加</button>

  <div class="list" id="list"></div>
</div>

<script>
  let mangas = JSON.parse(localStorage.getItem("mangas") || "[]");

  function save() {
    localStorage.setItem("mangas", JSON.stringify(mangas));
  }

  function addManga() {
    const title = document.getElementById("title").value;
    const note = document.getElementById("note").value;
    const image = document.getElementById("image").value;

    if (!title) return;

    mangas.push({ title, note, image });
    save();
    render();

    document.getElementById("title").value = "";
    document.getElementById("note").value = "";
    document.getElementById("image").value = "";
  }

  function removeManga(i) {
    mangas.splice(i, 1);
    save();
    render();
  }

  function render() {
    const list = document.getElementById("list");
    const keyword = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    mangas
      .filter(m => m.title.toLowerCase().includes(keyword))
      .forEach((m, i) => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          ${m.image ? `<img src="${m.image}" />` : ""}
          <strong>${m.title}</strong><br/>
          <small>${m.note || ""}</small><br/>
          <button class="delete" onclick="removeManga(${i})">削除</button>
        `;

        list.appendChild(div);
      });
  }

  render();
</script>

</body>
</html>
