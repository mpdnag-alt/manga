<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MangaShelf Complete</title>
<style>
body{margin:0;background:#0e0e12;color:#eee;font-family:sans-serif}
header{padding:15px;background:#16161e;position:sticky;top:0}
input,select,button{border-radius:8px;border:1px solid #333;padding:10px;background:#252535;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:12px}
.card{background:#16161e;border:1px solid #333;border-radius:10px;overflow:hidden}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.fab{position:fixed;right:20px;bottom:20px;width:60px;height:60px;border-radius:50%;background:#e8693a;font-size:30px}
.tag{display:inline-block;background:#252535;padding:2px 6px;border-radius:999px;font-size:12px;margin:2px}
dialog{background:#16161e;color:#fff;border:1px solid #333;border-radius:12px;width:min(500px,95vw)}
</style>
</head>
<body>
<header>
<h2>📚 MangaShelf</h2>
<input id="search" placeholder="検索" style="width:100%"><br><br>
<button onclick="randomPick()">🎲 Random</button>
<select id="sort">
<option value="date">追加日順</option>
<option value="views">閲覧順</option>
<option value="az">A-Z</option>
<option value="fav">お気に入り順</option>
</select>
</header>

<div id="grid" class="grid"></div>

<button class="fab" onclick="openAdd()">+</button>

<dialog id="dlg">
<h3 id="dlgTitle">追加</h3>
<input id="title" placeholder="タイトル" style="width:100%"><br><br>
<input id="tags" placeholder="タグ(,区切り)" style="width:100%"><br><br>
<input type="file" id="cover"><br><br>
<button onclick="save()">保存</button>
<button onclick="dlg.close()">閉じる</button>
</dialog>

<script>
const KEY='mangashelf_complete';
let data=JSON.parse(localStorage.getItem(KEY)||'[]');
let editId=null;

function persist(){localStorage.setItem(KEY,JSON.stringify(data));render();}

document.getElementById('search').oninput=render;
document.getElementById('sort').onchange=render;

function openAdd(){
editId=null;
title.value='';tags.value='';cover.value='';
dlgTitle.textContent='漫画追加';
dlg.showModal();
}

function save(){
const file=cover.files[0];
const finish=(img)=>{
if(editId){
let m=data.find(x=>x.id===editId);
m.title=title.value;
m.tags=tags.value.split(',').map(x=>x.trim()).filter(Boolean);
if(img!==undefined)m.cover=img;
}else{
data.push({
id:Date.now().toString(),
title:title.value,
tags:tags.value.split(',').map(x=>x.trim()).filter(Boolean),
cover:img||'',
fav:false,
views:0,
date:Date.now()
});
}
persist(); dlg.close();
}
if(file){
let r=new FileReader();
r.onload=e=>finish(e.target.result);
r.readAsDataURL(file);
}else finish(undefined);
}

function render(){
let q=search.value.toLowerCase();
let arr=data.filter(m=>m.title.toLowerCase().includes(q)||m.tags.join(' ').toLowerCase().includes(q));

switch(sort.value){
case 'views': arr.sort((a,b)=>b.views-a.views); break;
case 'az': arr.sort((a,b)=>a.title.localeCompare(b.title)); break;
case 'fav': arr.sort((a,b)=>(b.fav?1:0)-(a.fav?1:0)); break;
default: arr.sort((a,b)=>b.date-a.date);
}

grid.innerHTML=arr.map(m=>`
<div class="card">
${m.cover?`<img src="${m.cover}">`:`<div style="aspect-ratio:2/3;display:flex;align-items:center;justify-content:center">📖</div>`}
<div style="padding:8px">
<b>${m.title}</b><br>
👁 ${m.views} ${m.fav?'⭐':''}<br>
${m.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
<br><br>
<button onclick="viewManga('${m.id}')">開く</button>
<button onclick="editManga('${m.id}')">編集</button>
<button onclick="toggleFav('${m.id}')">⭐</button>
<button onclick="delManga('${m.id}')">🗑</button>
</div></div>`).join('');
}

function viewManga(id){
let m=data.find(x=>x.id===id);
m.views++;
persist();
alert(m.title+"\\nタグ: "+m.tags.join(", "));
}
function editManga(id){
let m=data.find(x=>x.id===id);
editId=id;
title.value=m.title;
tags.value=m.tags.join(',');
dlgTitle.textContent='編集';
dlg.showModal();
}
function toggleFav(id){let m=data.find(x=>x.id===id);m.fav=!m.fav;persist();}
function delManga(id){if(confirm('削除しますか？')){data=data.filter(x=>x.id!==id);persist();}}
function randomPick(){
if(!data.length)return alert('漫画がありません');
let m=data[Math.floor(Math.random()*data.length)];
alert('🎲 '+m.title);
}
render();
</script>
</body>
</html>
